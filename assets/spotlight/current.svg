<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="Weekly project spotlight">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="280" fill="url(#bg)" rx="24"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)" rx="24"/>

  <rect x="44" y="34" width="360" height="36" rx="10" fill="#0b1220" stroke="#f97316" stroke-width="1.5"/>
  <text x="62" y="58" fill="#f97316" font-size="20" font-weight="700" font-family="Inter,Segoe UI,Arial,sans-serif">PROJECT SPOTLIGHT · WEEK 10</text>

  <text x="56" y="108" fill="#f8fafc" font-size="42" font-weight="800" font-family="Inter,Segoe UI,Arial,sans-serif">myTodoApp</text>
  <text x="56" y="136" fill="#e5e7eb" font-size="26" font-family="Inter,Segoe UI,Arial,sans-serif">Android to-do app with local SQLite persistence and offline-first</text><text x="56" y="166" fill="#e5e7eb" font-size="26" font-family="Inter,Segoe UI,Arial,sans-serif">flow.</text>
  <text x="56" y="228" fill="#cbd5e1" font-size="22" font-family="Inter,Segoe UI,Arial,sans-serif">STACK · Ionic · Android · SQLite</text>

  <g filter="url(#shadow)">
    <rect x="770" y="74" width="384" height="132" rx="16" fill="#0b1220" stroke="#f97316" stroke-width="2"/>
    <text x="794" y="114" fill="#f8fafc" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,sans-serif">REPOSITORY</text>
    <text x="794" y="148" fill="#e2e8f0" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">https://github.com/yeraylois/myTodoApp</text>
    <text x="794" y="180" fill="#f97316" font-size="16" font-weight="700" font-family="Inter,Segoe UI,Arial,sans-serif">Rotates automatically every week</text>
  </g>
</svg>
