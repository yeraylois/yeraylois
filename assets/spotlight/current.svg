<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="440" viewBox="0 0 1400 440" role="img" aria-label="Weekly project spotlight">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="100%" stop-color="#0f1c35"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#ffd29d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff7a18" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="12" y="24" width="1376" height="404" rx="26" fill="url(#bg)"/>
  <rect x="12" y="24" width="1376" height="8" rx="26" fill="url(#acc)"/>

  <rect x="48" y="52" width="400" height="42" rx="12" fill="#0b1322" stroke="#ff7a18" stroke-width="1.8"/>
  <text x="70" y="80" fill="#ff7a18" font-size="26" font-weight="700" font-family="JetBrains Mono, Menlo, Consolas, monospace">PROJECT SPOTLIGHT · WEEK 10</text>

  <text x="56" y="140" fill="#f8fbff" font-size="66" font-weight="800" font-family="Space Grotesk, Inter, Segoe UI, Arial, sans-serif">myTodoApp</text>
  <text x="56" y="190" fill="#dbe6f7" font-size="20" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">Android to-do app with local SQLite persistence and</text><text x="56" y="224" fill="#dbe6f7" font-size="20" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">offline-first flow.</text>

  <text x="56" y="286" fill="#c8d7ee" font-size="22" font-weight="700" font-family="JetBrains Mono, Menlo, Consolas, monospace">TECH STACK</text>
  
  <rect x="56" y="300" width="132" height="42" rx="12" fill="#0a162c" stroke="#27374f" stroke-width="1.3"/>
  <image href="https://cdn.simpleicons.org/ionic/3880FF" x="68" y="309" width="24" height="24"/>
  <text x="100" y="328" fill="#e5ecf7" font-size="19" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">Ionic</text>

  <rect x="200" y="300" width="145" height="42" rx="12" fill="#0a162c" stroke="#27374f" stroke-width="1.3"/>
  <image href="https://cdn.simpleicons.org/android/3DDC84" x="212" y="309" width="24" height="24"/>
  <text x="244" y="328" fill="#e5ecf7" font-size="19" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">Android</text>

  <rect x="357" y="300" width="135" height="42" rx="12" fill="#0a162c" stroke="#27374f" stroke-width="1.3"/>
  <image href="https://cdn.simpleicons.org/sqlite/003B57" x="369" y="309" width="24" height="24"/>
  <text x="401" y="328" fill="#e5ecf7" font-size="19" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">SQLite</text>


  <line x1="870" y1="62" x2="870" y2="390" stroke="#20314b" stroke-width="1.5"/>

  <g filter="url(#softShadow)">
    <rect x="905" y="84" width="440" height="270" rx="20" fill="#091328" stroke="#ff7a18" stroke-width="2.2"/>
  </g>

  <text x="931" y="132" fill="#f8fbff" font-size="42" font-weight="800" font-family="Space Grotesk, Inter, Segoe UI, Arial, sans-serif">REPOSITORY</text>
  <text x="931" y="176" fill="#d4e0f5" font-size="19" font-family="JetBrains Mono, Menlo, Consolas, monospace">github.com/yeraylois/myTodoApp</text>

  <rect x="929" y="214" width="392" height="54" rx="14" fill="#101f38" stroke="#2a3f60" stroke-width="1.2"/>
  <text x="951" y="249" fill="#dbe6f7" font-size="23" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">Preview refreshed every week</text>

  <rect x="929" y="286" width="392" height="48" rx="14" fill="url(#acc)" filter="url(#innerGlow)"/>
  <text x="951" y="317" fill="#0a1020" font-size="24" font-weight="800" font-family="Space Grotesk, Inter, Segoe UI, Arial, sans-serif">OPEN REPOSITORY</text>
</svg>
