name: Generate Contribution Snake

on:
  schedule:
    - cron: "23 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contribution-snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate light and dark contribution snakes
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2336BCF7&color_dots=%23ebedf0,%23b6e3ff,%2354aeff,%230969da,%230a3069
            dist/github-contribution-grid-snake-dark.svg?color_snake=%239BE9A8&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish generated SVGs to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
