name: Generate Profile Metrics

on:
  schedule:
    - cron: "27 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    env:
      METRICS_USER: yeraylois
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Base metrics (light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: ${{ env.METRICS_USER }}
          filename: assets/metrics/base.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid
          config_twemoji: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Base metrics (dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: ${{ env.METRICS_USER }}
          filename: assets/metrics/base.dark.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid
          config_twemoji: yes
          config_theme: dark
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Languages metrics (light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: ${{ env.METRICS_USER }}
          filename: assets/metrics/languages.svg
          output_action: none
          base: ""
          config_timezone: Europe/Madrid
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming, markup

      - name: Languages metrics (dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: ${{ env.METRICS_USER }}
          filename: assets/metrics/languages.dark.svg
          output_action: none
          base: ""
          config_timezone: Europe/Madrid
          config_theme: dark
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming, markup

      - name: Commit metrics
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/metrics; then
            echo "No metric changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/metrics/*.svg
          git commit -m "chore(metrics): refresh profile metrics [skip ci]"
          git push
