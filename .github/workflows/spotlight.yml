name: Rotate Project Spotlight

on:
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: project-spotlight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spotlight:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Test spotlight generator
        working-directory: .github/scripts
        run: python -m unittest -v test_generate_spotlight.py

      - name: Generate bilingual spotlight SVGs
        env:
          SPOTLIGHT_PINNED_ID: "zephyr_t114_validator"
        run: python .github/scripts/generate_spotlight.py

      - name: Validate generated SVGs
        run: |
          python -c 'import xml.etree.ElementTree as ET; from pathlib import Path; [ET.parse(path) for path in Path("assets/spotlight").glob("current-*.svg")]'
          git diff --check

      - name: Commit spotlight changes
        run: |
          if git diff --quiet -- assets/spotlight .github/spotlight/current.json; then
            echo "No spotlight changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- assets/spotlight/current-*.svg .github/spotlight/current.json
          git commit -m "chore(spotlight): rotate weekly project [skip ci]"
          git push
