name: Update Dynamic Tech Stack

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-stack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pyyaml==6.0.2

      - name: Test stack updater and local icon catalog
        working-directory: .github/scripts
        run: python -m unittest -v test_update_stack.py test_generate_stack.py

      - name: Update stack from owned repositories
        env:
          # Prefer a fine-grained read-only token. SNAKE_TOKEN remains a
          # backwards-compatible fallback for the existing repository setup.
          STACK_REPOS_TOKEN: ${{ secrets.STACK_REPOS_TOKEN || secrets.SNAKE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: python .github/scripts/update_stack.py

      - name: Generate stack SVGs
        run: python .github/scripts/generate_stack.py

      - name: Validate generated SVGs
        run: |
          python -c 'import xml.etree.ElementTree as ET; from pathlib import Path; [ET.parse(path) for path in Path("assets/stack").glob("*.svg")]'
          git diff --check

      - name: Check for generated changes
        id: changes
        run: |
          if git diff --quiet -- assets/stack/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push generated stack
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- assets/stack/recent.json assets/stack/stack-*.svg
          git commit -m "chore(stack): refresh recent technologies [skip ci]"
          git push
